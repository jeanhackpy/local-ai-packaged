<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings avec Photos - Tableau</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: #f5f5f5;
            padding: 20px;
        }

        .header {
            max-width: 1600px;
            margin: 0 auto 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .controls {
            max-width: 1600px;
            margin: 0 auto 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: flex-end;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .control-group input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #5568d3;
        }

        .status {
            max-width: 1600px;
            margin: 0 auto 20px;
            padding: 12px 16px;
            border-radius: 4px;
            display: none;
            font-size: 13px;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1565c0;
        }

        .table-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            position: sticky;
            top: 0;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: #555;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .photo-cell {
            width: 120px;
            height: 90px;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
        }

        .photo-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .id-cell {
            font-family: monospace;
            font-size: 11px;
            color: #999;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .source-cell a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
        }

        .source-cell a:hover {
            text-decoration: underline;
        }

        .gallery-preview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            width: 300px;
        }

        .gallery-thumb {
            width: 50px;
            height: 50px;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pagination {
            max-width: 1600px;
            margin: 20px auto 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .pagination button {
            padding: 6px 12px;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #666;
            font-size: 13px;
            padding: 6px 12px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
        }

        .modal-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .modal-close:hover {
            background: rgba(0,0,0,0.9);
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .gallery-preview {
                grid-template-columns: repeat(3, 1fr);
                width: 150px;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px;
            }

            .photo-cell {
                width: 80px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Listings avec Photos</h1>
        <p>Consultez vos listings avec les photos directement dans le tableau</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="apiUrl">API URL</label>
            <input type="text" id="apiUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
        </div>
        <div class="control-group">
            <label for="apiKey">Clé API (apikey)</label>
            <input type="password" id="apiKey" placeholder="Collez votre clé API ANON_KEY" title="Sera utilisée dans le header 'apikey'">
        </div>
        <div class="control-group">
            <label for="limit">Lignes par page</label>
            <input type="number" id="limit" value="10" min="1" max="50">
        </div>
        <div class="control-group">
            <label for="offset">Décalage</label>
            <input type="number" id="offset" value="0" min="0">
        </div>
        <button onclick="loadListings()">📡 Charger</button>
    </div>

    <div id="status" class="status"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 130px;">Photo</th>
                    <th style="width: 250px;">Galerie (5 premières)</th>
                    <th style="width: 180px;">ID</th>
                    <th style="width: 200px;">Source</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="4" class="empty">Cliquez sur "Charger" pour voir les listings</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button onclick="previousPage()" id="prevBtn">⬅️ Précédent</button>
        <span class="page-info" id="pageInfo"></span>
        <button onclick="nextPage()" id="nextBtn">Suivant ➡️</button>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img id="modalImage" class="modal-image" src="" alt="">
        </div>
    </div>

    <script>
        let currentData = [];
        let currentLimit = 10;
        let currentOffset = 0;

        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
        }

        async function loadListings() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const limit = parseInt(document.getElementById('limit').value);
            const offset = parseInt(document.getElementById('offset').value);

            currentLimit = limit;
            currentOffset = offset;

            if (!apiUrl) {
                showStatus('❌ Entrez une URL API', 'error');
                return;
            }

            if (!apiKey) {
                showStatus('❌ Entrez une clé API', 'error');
                return;
            }

            showStatus('⏳ Chargement...', 'loading');

            try {
                const url = `${apiUrl}/rest/v1/units?select=id,primary_image_url,images,source_url&order=created_at.desc&limit=${limit}&offset=${offset}`;
                const response = await fetch(url, {
                    headers: {
                        'apikey': apiKey
                    }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                currentData = await response.json();
                renderTable();
                updatePagination();
                showStatus(`✓ ${currentData.length} listings chargés`, 'success');
            } catch (error) {
                showStatus(`❌ ${error.message} - Clé API valide? Pour la clé ANON_KEY: voir le guide setup`, 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');

            if (currentData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty">Aucun résultat</td></tr>';
                return;
            }

            tbody.innerHTML = currentData.map(unit => `
                <tr>
                    <td>
                        <div class="photo-cell" onclick="openModal('${unit.primary_image_url}')">
                            <img src="${unit.primary_image_url}" alt="Photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%2290%22%3E%3Crect fill=%22%23ddd%22 width=%22120%22 height=%2290%22/%3E%3C/svg%3E'">
                        </div>
                    </td>
                    <td>
                        ${unit.images && unit.images.length > 0 ? `
                            <div class="gallery-preview">
                                ${unit.images.slice(0, 5).map((img, idx) => `
                                    <div class="gallery-thumb" onclick="openModal('${img}')">
                                        <img src="${img}" alt="Photo ${idx+1}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22%3E%3Crect fill=%22%23ddd%22 width=%2250%22 height=%2250%22/%3E%3C/svg%3E'">
                                    </div>
                                `).join('')}
                            </div>
                            <small style="color: #999; margin-top: 5px; display: block;">Total: ${unit.images.length} photos</small>
                        ` : '<small style="color: #ccc;">Aucune photo</small>'}
                    </td>
                    <td class="id-cell">${unit.id}</td>
                    <td class="source-cell">
                        ${unit.source_url ? `<a href="${unit.source_url}" target="_blank">🔗 Voir</a>` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function updatePagination() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageInfo = document.getElementById('pageInfo');

            prevBtn.disabled = currentOffset === 0;
            nextBtn.disabled = currentData.length < currentLimit;
            pageInfo.textContent = `Décalage: ${currentOffset} | Par page: ${currentLimit}`;
        }

        function previousPage() {
            currentOffset = Math.max(0, currentOffset - currentLimit);
            document.getElementById('offset').value = currentOffset;
            loadListings();
        }

        function nextPage() {
            currentOffset += currentLimit;
            document.getElementById('offset').value = currentOffset;
            loadListings();
        }

        function openModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
